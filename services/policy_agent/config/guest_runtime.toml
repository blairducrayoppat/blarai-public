# Policy Agent Guest Runtime Configuration (Priority-5)

[runtime]
deployment_mode = "guest"

[service]
name = "policy_agent"
version = "0.1.0"
log_level = "INFO"

[inference]
device = "GPU"
model_dir = "models/qwen3-14b/openvino-int4-gpu"           # ADR-012: Qwen3-14B INT4
weight_manifest = "models/qwen3-14b/openvino-int4-gpu/manifest.json"  # ADR-012
draft_model_dir = "models/qwen3-0.6b/openvino-int4-gpu"    # ADR-012 §2.6
speculative_decoding_enabled = true                         # ADR-012 §2.6

[security]
fail_closed = true
dev_mode = true
require_signed_manifest = false  # FUT-04: off; dev_mode=true bypasses sig check anyway

[jwt]
issuer = "policy_agent"
validity_seconds = 5                # #638: 5s hard TTL per Use Cases_FINAL.md §3 (was 30 — fail-open)
private_key_path = ""
ca_cert_path = ""
algorithm = "ES256"

[ipc]
vsock_cid = 2
vsock_port = 5000
mtls_cert_path = ""
mtls_key_path = ""
ca_cert_path = ""
timeout_ms = 5000
max_message_bytes = 65536

[rules]
version = "1.0.0"
acl_path = "config/acl_matrix.toml"
deny_list_path = "config/deny_list.toml"

[rate]
max_requests_per_window = 100
window_seconds = 60.0

[boot]
measured_boot = false
attestation_timeout_ms = 10000
