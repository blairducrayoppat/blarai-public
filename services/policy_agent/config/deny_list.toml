# Resource Deny List — Policy Agent
# ============================================
# USE-CASE-001, P1.2: Resource-specific deny rules.
#
# Each [[deny_rules]] entry specifies a resource pattern that is
# unconditionally denied. Optional `verb` field restricts the rule
# to a specific action verb; omit or set to "" for all verbs.
#
# Patterns use fnmatch syntax:
#   *  = match everything
#   ?  = match any single character
#   [] = match character set
#
# Security:
#   - Any matching deny rule triggers immediate DENY (non-appealable).
#   - Rules are evaluated in order; first match wins.
#   - This file is version-controlled. Changes require PR review.

[[deny_rules]]
verb = ""
resource_pattern = "system.shutdown"
reason = "System shutdown is a privileged operation — not accessible via agent API."

[[deny_rules]]
verb = ""
resource_pattern = "system.config_write"
reason = "Configuration writes require out-of-band administrative access."

[[deny_rules]]
verb = ""
resource_pattern = "network.egress_raw"
reason = "Raw network egress is prohibited — violates Privacy Mandate."

# External-network URI scheme patterns. The primary enforcement is
# DeterministicPolicyChecker RULE 3 (_EXTERNAL_NETWORK_SCHEMES), which
# catches http/https/ftp/ftps/ws/wss/gopher as resource prefixes before
# the rule engine's fnmatch stage is even reached. These TOML patterns
# provide a defence-in-depth layer: they cover the same URI schemes as
# wild-card fnmatch patterns so the deny_list rule engine also rejects
# any CAR whose resource string begins with an external-network scheme
# and was not already stopped by RULE 3 (e.g. future callers that bypass
# DeterministicPolicyChecker and call run_rule_engine directly).
# Schemes: http, https, ftp, ftps, ws (WebSocket), wss, gopher.

[[deny_rules]]
verb = ""
resource_pattern = "http://*"
reason = "HTTP external-network resource — Privacy Mandate egress deny (P-004). Enforced by DeterministicPolicyChecker RULE 3 and this deny_list defence-in-depth entry."

[[deny_rules]]
verb = ""
resource_pattern = "https://*"
reason = "HTTPS external-network resource — Privacy Mandate egress deny (P-004). Enforced by DeterministicPolicyChecker RULE 3 and this deny_list defence-in-depth entry."

[[deny_rules]]
verb = ""
resource_pattern = "ftp://*"
reason = "FTP external-network resource — file-exfiltration vector; Privacy Mandate egress deny (P-004)."

[[deny_rules]]
verb = ""
resource_pattern = "ftps://*"
reason = "FTPS external-network resource — file-exfiltration vector; Privacy Mandate egress deny (P-004)."

[[deny_rules]]
verb = ""
resource_pattern = "ws://*"
reason = "WebSocket external-network resource — C2/exfil vector; Privacy Mandate egress deny (P-004)."

[[deny_rules]]
verb = ""
resource_pattern = "wss://*"
reason = "Secure WebSocket external-network resource — C2/exfil vector; Privacy Mandate egress deny (P-004)."

[[deny_rules]]
verb = ""
resource_pattern = "gopher://*"
reason = "Gopher external-network resource — protocol-smuggling vector; Privacy Mandate egress deny (P-004)."

[[deny_rules]]
verb = "DELETE"
resource_pattern = "substrate.*"
reason = "DELETE operations on substrate data require manual authorization."

[[deny_rules]]
verb = "EGRESS"
resource_pattern = "*"
reason = "EGRESS verb requires explicit external authorization (Red Team ISSUE-002)."

[[deny_rules]]
verb = "EXECUTE"
resource_pattern = "system.*"
reason = "EXECUTE on system resources is restricted to Measured Boot sequence."
