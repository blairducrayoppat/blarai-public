# Assistant Orchestrator Configuration — Default Profile
# USE-CASE-004: Conversational Generation Engine
# Updated: ADR-011 — GPU inference (NPU retired from P1 Core Loop)

[runtime]
deployment_mode = "host"

[service]
name = "assistant_orchestrator"
version = "0.3.0"
log_level = "INFO"

[gpu]
device = "GPU"                                     # ADR-011: All LLM inference on GPU (Arc 140V)
model_dir = "models/qwen3-14b/openvino-int4-gpu"  # ADR-012: Qwen3-14B INT4
weight_manifest = "models/qwen3-14b/openvino-int4-gpu/manifest.json"  # ADR-012
draft_model_dir = "models/qwen3-0.6b-pruned-6l/openvino-int8-gpu"  # pruned 6-layer INT8 draft -- streams incrementally (chosen 2026-05-22)
speculative_decoding_enabled = true                         # ADR-012 §2.6
max_context_tokens = 16384                         # DEC-03
priority = 1                                       # DEC-AO priority=1 (MEDIUM hint)
# KV-cache precision hint (OpenVINO 2026.2 GPU INT4/INT8 KV-cache quantization).
# Empty = unset = runtime default (FP16) — zero change from today. On the Arc 140V
# (XMX) this is opt-in, so it engages ONLY when set. A Session-2 memory/quality A/B
# knob (e.g. "u8" or "u4"); leave empty until measured.
kv_cache_precision = ""

[generation]
max_new_tokens = 4096
temperature = 0.0
top_k = 50
top_p = 0.9
repetition_penalty = 1.1
do_sample = false
# min_p nucleus floor (OpenVINO GenAI 2026.2). Drops low-probability tokens
# (p < min_p × p_max) before sampling; only affects do_sample=true runs.
# 0.0 = disabled (default; preserves current behaviour). A Session-2 A/B knob
# for answer quality — leave at 0.0 until measured.
min_p = 0.0
# Grammar-constrained tool calls (#718 — xgrammar triggered structural tags,
# OpenVINO GenAI structured output). true: free text is unaffected, but the
# moment the model emits the <tool_call> trigger the decoder is constrained
# to a schema-valid {"name": <registered tool>, "arguments": <typed args>}
# body — a malformed or unknown-tool call is structurally impossible at the
# decoder. Verified offline to compose with speculative decoding + streaming
# (probe 2026-07-01) and live once (2026-07-02, 4.8s tool turn).
# OFF since 2026-07-02 (LA decision revising D2, #718): a LIVE xgrammar
# crash killed a real tool turn at the stop-token boundary under
# spec-decode — grammar_matcher.cc:627 "GrammarMatcher has terminated after
# accepting the stop token, but is trying to find the next token mask"
# (GenAI 2026.2.1). Fail-closed generation error; no output corruption.
# Tracked + upstream report: Vikunja #725. Do NOT re-enable before the
# runtime fix lands and the #725 revisit criterion passes.
# false = parse-time validation only: the model still emits native JSON
# (trained format) and tools.parse_tool_call's strict parse + schema
# validation (fail-closed) remains the guard.
tool_call_grammar = false
response_depth_mode = "standard"   # concise | standard | detailed

[preemption]
timing_multiplier = 5.0    # Flag preemption if step > N× running median
min_detection_samples = 3  # Min steps before detection activates

[circuit_breaker]
max_output_tokens = 4096
max_tool_call_depth = 5

[pgov]
cosine_similarity_threshold = 0.85
# PII output policy: "off" | "block" | "redact". A local, single-user
# personal assistant exists to surface the user's own data back to them,
# so "off" is the correct production posture. "block" suppresses any
# response containing PII. "redact" surfaces PII traced to the user's own
# documents/messages and replaces untraceable (hallucinated/injected) PII
# with a visible marker -- see docs/governance/ for the rationale.
pii_mode = "off"
delimiter_echo_enabled = true
tool_allowlist_enabled = true
leakage_detection_enabled = true
embedding_model_path = "models/bge-small-en-v1.5/onnx-fp16/model.onnx"
# Layer 3 default posture (ADR-023, supersedes ADR-013). RE-ENABLED
# 2026-06-04 (Sprint 12 EA-3). The gate now fires ONLY when UNTRUSTED-
# provenance content is present (pasted external text, or a future
# web-fetch result). Trusted-local files and trusted-memory never trip
# it, so secure-by-default carries ZERO daily-driver friction — which is
# exactly why the ADR-013 pause (block on ANY loaded document) could be
# lifted. The full architecture remains (gate, /trust override, helpful
# inline message, audit logging). The 2026-05-26 /unload-restore bug is
# fixed by the provenance gate: /unload clears untrusted content and the
# subsequent trusted-memory retrieval can no longer re-trip the gate.
# Misconfiguration warning: when set false here, the AO emits a WARNING
# at startup so the non-secure default is visible in launcher.log.
# (Back-compat: the legacy key block_tools_when_documents_loaded is still
# read if this key is absent.)
block_tools_on_untrusted_content = true

[context]
spotlighting_enabled = true
max_history_turns = 20
max_context_tokens = 4096

[substrate]
# Personal Knowledge Substrate (USE-CASE-002, ADR-016 / ADR-025) live-memory
# footprint control (Vikunja #611). The substrate decrypts every document/turn
# embedding ONCE into an in-RAM cache and, by default, holds it for the store's
# whole lifetime -- the largest and longest-lived plaintext-derived secret in
# RAM (embeddings are semantically invertible). When this many seconds pass with
# no retrieval, the cache is UNLOADED: its numpy buffers are zeroed in place
# (genuine overwrite -- numpy arrays are mutable, unlike the immutable-bytes DEK)
# and dropped, shrinking both the exposure window and the 32 GB memory footprint.
# The next retrieval re-decrypts the same rows lazily (a one-time re-decrypt cost
# on the first query after idle). Set to 0 (or negative) to DISABLE idle-unload
# and keep the cache resident for the store's lifetime (the pre-#611 behaviour).
# Default 900 s = 15 min. NOTE: the right default is the on-box reload-latency
# re-measure (see PERFORMANCE_LOG.md / docs/performance/); 900 s is the
# placeholder until that measurement lands.
embed_cache_idle_unload_s = 900

[embeddings]
# Inference device for the shared bge-small-en-v1.5 embedding model (#720) --
# substrate memory, the knowledge bank, and PGOV Stage-5 leakage detection all
# ride the ONE embedding session this selects.  "CPU" = the ONNX Runtime CPU
# path (the pre-#720 executor); "NPU"/"GPU" compile the SAME fp16 ONNX via
# OpenVINO on that device (a device knob, NOT a precision knob).  FAIL-SOFT:
# an OpenVINO compile failure logs EMBED_OFFLOAD_FALLBACK and falls back to
# the CPU path -- an offload optimisation never refuses to start (contrast
# the fail-closed check_leakage control itself).  ADR-011 retired the NPU
# from LLM DECODING only; encoder offload does not touch that decision.
# Default "NPU" set from the 2026-07-02 on-box measurement (PERFORMANCE_LOG.md
# + docs/performance/embedding_device_2026-07-02_00-10-26.json): vs the CPU
# path the NPU is 13.6x faster on document-window texts (168.9 -> 12.4 ms),
# 2.2x on batch-32, parity on short singles -- while freeing BOTH the P-cores
# and the (14B-contended) GPU. Warm boot compile ~2.5 s via the blob cache
# (%LOCALAPPDATA%/BlarAI/ov_cache/embeddings); a box without a working NPU
# falls soft to CPU automatically.
device = "NPU"

[knowledge]
# Knowledge bank (UC-002 Substrate v2, Vikunja #655) — the operator-curated,
# approval-gated encrypted store behind the UC-003 ingest flow. A SIBLING of
# substrate.db under the SAME DEK envelope (ADR-025 one-DEK rule), own DACL,
# own DATA_MAP row. Pending rows hold cleaned content only; APPROVE chunks +
# embeds + indexes; REJECT tombstones with content retained. Retrieval reads
# approved chunks ONLY and grounds them as UNTRUSTED_EXTERNAL regardless of
# stored provenance (ADR-023 / lesson 13). Feature-level fail-closed: a
# construction failure disables ingest + knowledge retrieval LOUDLY but never
# blocks AO boot (deliberate middle ground between the substrate's silent
# degrade and the session-store's refuse-to-start).
enabled = true
db_filename = "knowledge.db"
# Hybrid-retrieval budget (cosine + FTS5 BM25, reciprocal-rank fusion k=60).
retrieve_k = 4
# Knowledge-chunk embedding token window (bge-small native max 512). Bound to
# LeakageDetector.embed_documents — the 128-token leakage path is untouched
# (PGOV Stage-5 thresholds are calibrated there; byte-identical is a
# regression requirement).
embed_max_tokens = 512
# Byte cap enforced BEFORE reading an encrypted ingest staging file
# (%LOCALAPPDATA%\BlarAI\ingest_staging\<doc_uuid>.bin) — fail-closed refuse.
staging_max_bytes = 262144
# the 4th weld lock for UC-003 Workstream B (display-only images) — image fetch
# is dormant until this is flipped AND the egress door is opened (separate LA
# go-live ceremony).
images_enabled = false

[web_search]
# #719 — the model-callable web_search tool (ADR-024 W4 LiveKagiAdapter).
# LIVE since the 2026-07-02 go-live ceremony
# (docs/runbooks/web_search_go_live.md): flag flipped with the DPAPI key
# provisioned and the ADR-027 allowlist activated (kagi.com sole entry, read
# by BOTH egress layers — the D4 tool-loop check and the guarded_fetch door).
# The AO registers the live runner at boot ONLY when this is true AND the
# operator-provisioned, DPAPI-sealed Kagi API key loads
# (%LOCALAPPDATA%\BlarAI\secrets\kagi_api_key.dpapi —
# `python -m shared.secrets.provision_kagi_key`); key absent/malformed →
# structurally dormant (the deterministic "unavailable" notice). RE-WELD:
# flipping this back to false (+ restart) is re-weld step 1 — the runner
# never registers. Steps 2 (empty the allowlist) and 3 (delete the key blob)
# are each independently sufficient; see the runbook.
enabled = true

[egress]
# ADR-023 Amendment 4 (#723 rung 3) — the turn-scoped Windows-Hello egress
# envelope. The HUMAN consent layer in front of every model-initiated outbound
# tool call (web_search + any future egress tool). On the FIRST egress of a user
# turn a fingerprint fires showing the exact query; ONE touch covers up to
# `searches_per_fingerprint` (N) searches for that question; every subsequent
# query is disclosed live in chat as it leaves; exceeding N → a fresh
# fingerprint. Fail-closed (no verifier / timeout / cancel → the egress is
# refused and the turn ends with a clear message). This REPLACES the per-session
# /trust for egress tools; it runs IN ADDITION to the deterministic egress
# controls (the #570 PA RULE 3 + the kagi.com allowlist + the exfil screen),
# never instead of them.
#
# N default = 3 (LA decision 2026-07-02). The tool loop is hard-capped at 3
# iterations/turn, so N=3 is effectively "at most one fingerprint per turn" while
# every query is still disclosed. Relax path if the friction bites is per-session
# grain (looser). Set N=1 for a fingerprint on EVERY outbound query.
searches_per_fingerprint = 3
# Bounded wait (seconds) for the operator's fingerprint answer; on expiry the
# egress is DENIED (fail-closed). Matches escalation_consent's default; a console
# operator answers in seconds — this is the wedged-surface backstop, not the path.
fingerprint_timeout_s = 120.0

[image_generation]
# UC-010 Local Generative Imaging (ADR-033) — local text->image + image+text->image
# on the Arc 140V via an uncensored SDXL-INT8 finetune (RealVisXL V5.0).
# DORMANT: ships enabled=false AND the model is gitignored (absent), so
# is_available() is False and nothing ever loads.  Going live is a SEPARATE
# LA-present ceremony (one-time operator content attestation -> flip enabled ->
# verify LIVE on the GPU), never a runtime decision (ADR-033 §dormancy/go-live).
# Content safety is governance + the go-live attestation, NOT a classifier:
# uncensored for all LEGAL content; the immovable legal boundary is the
# operator's sole documented responsibility + a deliberate ACCEPTED-RISK
# (ADR-033 §content-safety).
enabled = true   # GO-LIVE 2026-06-16 (#666): flipped after VERIFIED TPM-signed manifest + the recorded content attestation (ledger 20260616_182807). require_signed_manifest stays true.
# ADR-023 Amendment 4 (#723 rung 2, DORMANT seam): bounded wait (seconds) for the
# operator's one-click answer on a per-generation-batch approval, on expiry DENIED
# (fail-closed). UNUSED today — the in-loop generate_image is a no-op directive
# shim (nothing to approve; it is lock-exempt), so no real model-initiated
# generation is gated; this activates only when a real generator tool is added to
# tools._GEN_APPROVAL_TOOLS + a verifier is registered.
tool_approval_timeout_s = 120.0
# Model-agnostic dir (a later checkpoint swap is config, not a rewrite).  The
# diffusers-OV INT8 layout (unet/ text_encoder*/ vae_*/ tokenizer*/ scheduler/
# model_index.json).  models/ is gitignored => the capability ships ABSENT.
model_dir = "models/sdxl-uncensored/openvino-int8-gpu"
# SHA-256 weight manifest verified at load (fail-closed; nested layout — every
# .bin AND .xml topology AND model_index.json is hashed + required, and any
# extra/unlisted one is rejected).  Staged at provisioning by
#   python -m shared.models.stage_production_manifest --nested   (BLARAI_MODEL_DIR=...)
# then SIGNED by shared.models.manifest_signer.sign_manifest (see
# require_signed_manifest below).  Runtime never fetches weights.
weight_manifest = "models/sdxl-uncensored/openvino-int8-gpu/manifest.json"
device = "GPU"          # ADR-011: all model inference on the Arc 140V iGPU
steps = 30              # base RealVisXL V5.0 uses the DDIM scheduler (NOT a Lightning few-step model), which needs ~25-40 steps; 6 produced pure noise (#666 go-live). Tune for quality/speed.
# Sampler / quality knobs (UC-010 quality tuning, #666). The base RealVisXL V5.0
# ships a DDIM scheduler; EULER_ANCESTRAL_DISCRETE renders sharper detail at the
# same step count. Valid: AUTO (= model default), DDIM, EULER_DISCRETE,
# EULER_ANCESTRAL_DISCRETE, LMS_DISCRETE, PNDM (an unknown value fails soft to
# the model default at load).
scheduler = "EULER_ANCESTRAL_DISCRETE"
# Classifier-free guidance — the prompt-adherence / contrast knob. SDXL sweet
# spot ~5-8; RealVisXL tolerates ~3-7 for natural photoreal output. Range [0,30].
guidance_scale = 7.0
# QUALITY negative prompt — steers AWAY from the common artifact failure modes
# (blur, bad hands/anatomy, watermarks). This is a QUALITY steer ONLY: it carries
# NO content/subject terms, so it does NOT re-censor the deliberately uncensored
# model (ADR-033 §content-safety). Clear it ("") to disable; an explicit per-call
# negative prompt overrides it.
negative_prompt = "blurry, low quality, worst quality, low resolution, deformed, disfigured, bad anatomy, malformed limbs, extra limbs, extra fingers, fused fingers, mutated hands, poorly drawn hands, poorly drawn face, mutation, ugly, watermark, signature, text, jpeg artifacts, grainy"
# Hires-fix second pass (UC-010 #666). After the base 1024^2 generate, upscale by
# hires_factor and run a LOW-strength img2img refine — this gives small regions
# (notably FACES) more pixels to resolve, the proven fix for soft faces in wide
# shots. Cost: ~2x generation time (a second model load + pass). hires_max_edge
# is a GPU-OOM circuit breaker: the refine runs co-resident with the always-on
# 14B, so 1536 is the aggressive-but-usually-fits ceiling. If a generate
# fail-softs to the base image (watch launcher.log for "hires-fix refine" then a
# fall-back), lower hires_factor to 1.25 (or hires_max_edge to 1280). Set
# hires_enabled=false for fast drafts.
# DISABLED 2026-07-02 (operator live-verify): on the 258V/Arc-140V/31.3 GB box the
# 1536^2 hires refine drove SYSTEM RAM to 100% (avail=8 MB) EVEN with the 14B
# evicted — the generate then took ~209 s (past the 175 s UI failsafe → false
# "timed out") AND left the process degraded so the next /save reported a stale
# "Insufficient memory" with 22 GB actually free. Base 1024^2 peaks ~62% RAM and
# is fast + stable, so hires is off by default here. Re-enable ONLY at a reduced
# ceiling (hires_max_edge=1280, hires_factor=1.25) and re-measure RAM headroom.
hires_enabled = false
hires_factor = 1.5
hires_strength = 0.4
hires_max_edge = 1536
max_width = 1024        # circuit breaker (GPU-OOM / memory-DoS, ADR-033 §H)
max_height = 1024
# RESERVED knob (validated + plumbed, NOT yet consumed): the diffusion pipeline
# is evicted after EVERY generate by the caller's `finally` (the sole live
# eviction), so no idle-unload daemon ships today; a timer mirroring substrate
# #611 is a future option. Kept for forward-compat and so the value is on record.
idle_unload_s = 60
# FUT-04 parity with the 14B (ADR-018 / ADR-033 WS1). When true the nested SDXL
# manifest MUST be present AND carry a valid TPM .sig or the load refuses
# fail-closed (no SKIP-with-WARNING). Shipped true so the go-live ceremony has to
# stage + sign the manifest before flipping enabled. DORMANT-SAFE: verify fires
# only when enabled=true AND the model is present, so it never engages on the
# shipped (enabled=false, model-absent) default.
require_signed_manifest = true
# UC-010 image STYLE is selected PER REQUEST (#703): the chat command sets the
# style on the IMAGE_GEN_REQUEST — /imagine→photoreal (the SDXL above),
# /illustrate→flat-vector (base SDXL below, no LoRA), /cartoon→cartoon (the SAME
# base SDXL + the flat-vector LoRA applied at RUNTIME, never fused). The
# model_variant key below is a DEPRECATED back-compat no-op (kept only so an old
# config still validates); it no longer selects the model.
model_variant = "photoreal-sdxl"
# Illustration model — base Stable Diffusion XL 1.0, OV INT8 (#703). SHARED by
# /illustrate (no LoRA) AND /cartoon (+ runtime LoRA). models/ is gitignored ⇒
# absent on a clean checkout. Manifest staged by
#   BLARAI_MODEL_DIR=... python -m shared.models.stage_production_manifest --nested
# then SIGNED by shared.models.manifest_signer.sign_manifest.
illustration_model_dir = "models/sdxl-illustration/openvino-int8-gpu"
illustration_weight_manifest = "models/sdxl-illustration/openvino-int8-gpu/manifest.json"
# Flat-vector LoRA for /cartoon, applied at RUNTIME (ov_genai AdapterConfig) over
# the base SDXL above — NEVER fused (fusing collapsed prompt conditioning).
# illustration_lora_alpha is the style strength; illustration_lora_sha256 (when
# non-empty) is integrity-verified before load (fail-soft to no adapter on a
# mismatch). models/ is gitignored ⇒ the LoRA is absent on a clean checkout
# (cartoon then fail-softs to flat — no adapter).
illustration_lora_path = "models/sdxl-illustration/lora/DD-vector-v2.safetensors"
illustration_lora_alpha = 0.8
illustration_lora_sha256 = "b4c8132f85ab7d75f5789eaf0054153a6011b505719f1253fb7d8837a498fe89"

[fleet_dispatch]
# Headless-coding DISPATCH (agentic-setup brief §9) — BlarAI enqueues a coding
# task to the EXISTING coding fleet (30B / OVMS / worktrees / verify-gate /
# auto-merge), triggers a run, and reads back the run summary. BlarAI embeds NO
# coder; it calls the fleet's documented entry points (add-fleet-task.ps1 /
# run-fleet.ps1) against the operator's OTHER project repos (the fleet refuses
# ~/BlarAI). Local host subprocess only — NO network egress.
# DORMANT: ships enabled=false. With this false /dispatch returns a clear disabled
# notice and NO subprocess is ever spawned. Increment 2 adds the 14B-driven task
# decomposition + the host-level model-swap automation (the 14B and the fleet's 30B
# cannot co-reside — milestone 1); both stay dormant behind this same flag.
enabled = true

# Increment-2 swap: pre-load headroom gate — GiB of free RAM required after BlarAI
# fully steps aside, before the 30B is loaded. 20 GiB (LA-set 2026-07-09, #777) —
# MEASURED on the current substrate (OpenVINO GenAI 2026.2.1, warm compile cache):
# a supervised load from a 19.85 GiB ambient completed READY in ~13s with NO page
# storm (Available floor 4.6 GiB, disk saturated ~10s of weight staging only),
# zero gate-step slowdown under the post-load squeeze, and a normal generation.
# The prior 21 matched start-llm's gate and the 2026-06-21 era (OV 2026.1.0,
# lowest observed success 23.1 GiB) — that dataset never TESTED below 23.1; #777
# converted the inference into a measurement. Caveat honestly carried: the #777
# run was WARM-cache; a rare COLD load (post-OVMS-upgrade, #747 class) stages
# more and is backstopped by the 480s load deadline + this gate's GRACEFUL abort
# (restores the 14B). Keep in lockstep with start-llm's $needGB and the battery
# lean-preflight ($LEAN_GATE_GIB = this + 0.5). Tunable without a code change.
swap_min_free_gb = 20.0

# Problem-2 (#670): out-of-band OVERALL-run budget (seconds). A watchdog in the detached
# swap driver force-kills a wedged run-fleet child and tears down to restore the 14B if the
# whole task loop exceeds this — the backstop for a hung/over-long coding task that would
# otherwise strand the 30B resident (the live failure this fix closes). A value <= 0
# DISABLES the watchdog (full back-compat).
# #757 (night-2, 2026-07-07): the old 5400 s (90 min) ceiling was sized to pre-plan-graph
# runs (~50 min for 8-9 tasks); a 5-task battery job's BUILDS alone measured 74-79 min
# (B4/B6 journals), so the budget tree-killed the final acceptance-tests task mid-candidate
# and the job oracle never ran. 10800 s (3 h) gives the measured build phase + a full
# worst-case acceptance task real headroom; run-fleet's idle-detection and the per-task
# ceiling (swap_ops.TASK_TIMEOUT_S) remain the wedge defenses — this is an abort bound,
# not a wait: healthy runs still finish in ~45-95 min.
swap_run_budget_s = 10800.0

# Pre-go-live (#670): the dispatch target is config-driven, NOT compiled in. These two
# roots locate (a) the agentic-setup fleet — its scripts/ + state/ (queue + runs) derive
# from this root — and (b) the operator's projects dir, the ONLY allowed dispatch target
# (the fleet refuses ~/BlarAI regardless). Forward slashes are fine on Windows. Change
# them here to point at a different layout without a code change; an empty value falls
# back to the build_default_config compiled-in default for this box.
agentic_setup_dir = "C:/Users/mrbla/agentic-setup"
projects_dir = "C:/Users/mrbla/projects"

# Increment-3 EXECUTE: reply-then-exit grace (seconds). After the operator approves a
# dispatch, the AO sends the "stepping aside" reply and waits this long before signalling
# the launcher to exit, so the WinUI shows the notice before its window closes for the
# swap. A live-tuned knob (#670) — adjust without a code change if the message is missed.
step_aside_grace_s = 2.0

# M2 plan-graph (W1, #740): when true, the swap driver plans a big dispatch as a
# dependency-ordered JobPlan (shared/fleet/plan_graph.py — validated waves, context
# packs, per-wave integration gates, evidence-gated statuses) instead of today's flat
# serial task queue. false is BYTE-IDENTICAL today-behavior: the knob gates the new
# planner layer only — no plan artifact is written, no wave compiler runs, nothing
# changes anywhere. ON since the W8 live proof (2026-07-05 run 20260705-214803-bd —
# a real 6-task dependency graph executed in waves on the Arc 140V; #740/#748; the
# LA's proven-features-default-LIVE rule).
plan_graph = true

# #749 dispatch→Vikunja bridge: one durable ticket per dispatched job in a
# dedicated Vikunja project (created at dispatch, outcome at REPORT, closed only
# on a GREEN + oracle-passed scorecard, left OPEN on PARKED-HONEST/STALLED with
# evidence pointers — the operator's across-jobs actionable queue). OUTCOMES
# ONLY, never heartbeats. Loopback-only (:3456), FAIL-SOFT (a Vikunja outage
# never affects a run), and it is dispatch-side dev tooling — the sealed AO
# runtime grows NO new egress (the socket lives under tools/, not the runtime).
# DEFAULT OFF until the supervised live proof; even on, an unset project id (0)
# refuses to post.
vikunja_bridge = false
vikunja_bridge_project_id = 0

# #744 guest-certified oracle (plan §10.3, the S4 residual): when true, the swap
# driver re-runs the JOB-level acceptance oracle inside the NIC-less Alpine guest
# (BlarAI-Orchestrator, vsock 50001) as an ADVISORY isolation certificate — once
# per job, in the teardown's RAM-free window (after UNLOAD-30B, before RESTART-AO),
# source-only over the UC-003 staging-corridor pattern. It NEVER changes the job
# verdict or attribution: the host gate stays the fidelity gate; the guest result
# lands beside it as evidence (guest-oracle.json), with any host-pass/guest-fail
# divergence flagged. LIVE since the 2026-07-08 LA-supervised go-live ceremony
# (#744): the blarai-oracle guest service is provisioned (vsock 50002, pytest
# 9.1.1 + hypothesis in the NIC-less Alpine guest), the AF_HYPERV transport is
# registered at real_run_guest_oracle, and the corridor was proven live in both
# directions (a passed AND a failed round-trip) before this flip. Fail-soft:
# an unreachable guest is an honest not-run in guest-oracle.json — never a
# verdict change, never a blocked 14B restore.
guest_oracle_enabled = true

[security]
fail_closed = true
dev_mode = false
jwt_ca_cert_path = "certs/pa_public.pem"   # ADR-021: PA JWT public key (ceremony-generated, per-chip, gitignored)
# FUT-04 / ADR-018: TPM-signed manifest verification.  Off by default — the capability
# is built but the LA must run the provisioning ceremony first, then flip this to true.
# With false: missing .sig is permitted (WARNING emitted); present-but-invalid .sig
# is still FAIL-CLOSED.  With true: missing OR invalid .sig blocks boot entirely.
require_signed_manifest = true

[ipc]
vsock_cid = 2
vsock_port = 5001
mtls_cert_path = "certs/orch_client.pem"
mtls_key_path = "certs/orch_client_key.pem"
ca_cert_path = "certs/ca.pem"
policy_agent_port = 5000
timeout_ms = 5000
max_message_bytes = 65536
